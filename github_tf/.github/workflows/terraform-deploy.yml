name: Terraform Deploy and Push Docker Image

on:
  push:
    branches:
      - main
      - feature/*

jobs:
  terraform:
    name: Setup ECR using Terraform
    runs-on: ubuntu-latest
    outputs:
      ecr-url: ${{ env.ECR_URL }}
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
          terraform_version: 1.7

      - name: Initialize Terraform
        working-directory: ./infra/aws
        run: terraform init

      - name: Apply Terraform
        working-directory: ./infra/aws
        run: terraform apply -auto-approve

      - name: Extract ECR repository URL
        id: ecr
        working-directory: ./infra/aws
        run: echo "ECR_URL=$(terraform output -raw repository_url)" >> $GITHUB_ENV

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: terraform
    env:
      ECR_URL: ${{ needs.terraform.outputs.ecr-url }}
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.23"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Print ECR_URL
        run: echo "ECR_URL is ${{ env.ECR_URL }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        working-directory: ./src
        run: |
          docker build -t ${{ env.ECR_URL }}:latest .

      - name: Tag Docker image
        run: |
          IMAGE_TAG=$(git rev-parse --short HEAD)
          docker tag ${{ env.ECR_URL }}:latest ${{ env.ECR_URL }}:$IMAGE_TAG

      - name: Push Docker image to ECR
        run: |
          IMAGE_TAG=$(git rev-parse --short HEAD)
          docker push ${{ env.ECR_URL }}:$IMAGE_TAG
          docker push ${{ env.ECR_URL }}:latest
